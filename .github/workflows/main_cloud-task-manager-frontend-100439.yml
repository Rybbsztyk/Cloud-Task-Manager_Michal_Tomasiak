name: Build and deploy Node.js app to Azure Web App - cloud-task-manager-frontend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build
        run: |
          npm install
          npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: https://cloud-task-manager-100439-e6ghgtbueaemh9fe.francecentral-01.azurewebsites.net

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: dist

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FA17B8C645EE4C37B65CDBCFD8C07B25 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_72CC99020D5245949F4E7637CE6A5C4C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_41A946AD46AE4A63BE79EAEE144916C9 }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cloud-task-manager-frontend'
          package: dist
          startup-command: "pm2 serve /home/site/wwwroot --no-daemon --spa"
 
